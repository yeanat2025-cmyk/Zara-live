<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>About You — ZaraLive</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    font-family:'DM Sans',sans-serif;
    background:#fff; min-height:100vh;
    display:flex; flex-direction:column; overflow-x:hidden;
  }

  .top-banner{
    height:180px; flex-shrink:0;
    background:radial-gradient(ellipse at 50% -20%, #4a0080 0%, #1a0040 60%, #0e0028 100%);
    position:relative; overflow:hidden;
  }
  .top-banner::after{
    content:''; position:absolute; bottom:-1px; left:0; right:0; height:60px;
    background:linear-gradient(to bottom, transparent, #fff);
  }

  .content{ flex:1; padding:0 24px 130px; display:flex; flex-direction:column; }

  .back-btn{
    width:36px; height:36px; border-radius:50%; background:none; border:none;
    cursor:pointer; display:flex; align-items:center; justify-content:center;
    font-size:20px; color:#222; margin:16px 0 24px; transition:background 0.2s;
  }
  .back-btn:hover{ background:#f0f0f0; }

  .about-label{ color:#00bcd4; font-size:14px; font-weight:500; margin-bottom:4px; }
  .title{ font-family:'Syne',sans-serif; font-size:30px; font-weight:800; color:#0d47a1; margin-bottom:28px; }

  /* Gender Cards */
  .gender-card{
    border-radius:20px; padding:16px 20px;
    display:flex; align-items:center;
    cursor:pointer; margin-bottom:16px;
    position:relative; overflow:hidden;
    transition:transform 0.2s, box-shadow 0.2s;
    min-height:120px;
  }
  .gender-card:hover{ transform:scale(1.01); }
  .gender-card.selected{ box-shadow:0 0 0 3px #7c3aed; }
  .card-male{
    background:linear-gradient(135deg,#f3e8ff,#ede7f6);
    justify-content:space-between;
  }
  .card-female{
    background:linear-gradient(135deg,#e0f7fa,#b2ebf2);
    justify-content:space-between;
  }

  .gender-pill{
    padding:14px 32px; border-radius:30px;
    font-family:'Syne',sans-serif; font-size:22px; font-weight:800;
    border:none; cursor:pointer; transition:transform 0.15s;
  }
  .gender-pill:active{ transform:scale(0.96); }
  .pill-male{
    background:linear-gradient(135deg,#e040fb,#ce93d8);
    color:#fff; box-shadow:0 4px 16px rgba(224,64,251,0.35);
  }
  .pill-female{
    background:linear-gradient(135deg,#26c6da,#80deea);
    color:#fff; box-shadow:0 4px 16px rgba(38,198,218,0.35);
  }

  /* Character images with golden frame */
  .frame-wrap{
    position:relative; flex-shrink:0;
  }
  .frame-img{
    width:86px; height:86px; border-radius:10px;
    object-fit:cover;
    border:4px solid #f5b942;
    box-shadow:0 4px 16px rgba(245,185,66,0.4);
  }
  /* Fallback emoji frame */
  .frame-fallback{
    width:86px; height:86px; border-radius:10px;
    background:#f0e6c8;
    border:4px solid #f5b942;
    display:none; align-items:center; justify-content:center;
    font-size:52px;
    box-shadow:0 4px 16px rgba(245,185,66,0.3);
  }

  /* Next button */
  .next-btn{
    position:fixed; bottom:0; left:0; right:0;
    padding:20px 24px 36px; background:#fff;
  }
  .next-btn button{
    width:100%; height:58px; border-radius:14px;
    background:linear-gradient(90deg,#00bcd4,#26c6da);
    color:#fff; border:none; cursor:pointer;
    font-family:'Syne',sans-serif; font-size:16px; font-weight:700; letter-spacing:2px;
    box-shadow:0 6px 20px rgba(0,188,212,0.4);
    transition:opacity 0.2s,transform 0.15s;
  }
  .next-btn button:hover{ opacity:0.9; transform:translateY(-1px); }
  .next-btn button:disabled{ opacity:0.4; cursor:not-allowed; transform:none; }

  .toast{
    position:fixed; bottom:110px; left:50%; transform:translateX(-50%);
    background:#333; padding:10px 20px; border-radius:20px;
    color:#fff; font-size:13px; opacity:0; transition:opacity 0.3s;
    white-space:nowrap; z-index:99;
  }
  .toast.show{ opacity:1; }
</style>
</head>
<body>

<div class="top-banner"></div>

<div class="content">
  <button class="back-btn" onclick="history.back()">←</button>
  <div class="about-label">About you</div>
  <div class="title">I am</div>

  <!-- Male Card -->
  <div class="gender-card card-male" id="maleCard" onclick="selectGender('male')">
    <div class="frame-wrap">
      <img
        class="frame-img"
        src="assets/male.png"
        alt="Male"
        onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"
      >
      <div class="frame-fallback">👦</div>
    </div>
    <button class="gender-pill pill-male">Male</button>
  </div>

  <!-- Female Card -->
  <div class="gender-card card-female" id="femaleCard" onclick="selectGender('female')">
    <button class="gender-pill pill-female">Female</button>
    <div class="frame-wrap">
      <img
        class="frame-img"
        src="assets/female.png"
        alt="Female"
        onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"
      >
      <div class="frame-fallback">👧</div>
    </div>
  </div>
</div>

<div class="next-btn">
  <button id="nextBtn" onclick="goNext()" disabled>NEXT</button>
</div>
<div class="toast" id="toast"></div>

<script type="module">
  import { checkAuth, saveUserProfile } from './firebase.js';

  let selectedGender = null;
  let currentUser = null;

  checkAuth((user) => {
    if (!user) { location.href = 'login.html'; return; }
    currentUser = user;
  });

  window.selectGender = (g) => {
    selectedGender = g;
    document.getElementById('maleCard').classList.toggle('selected', g === 'male');
    document.getElementById('femaleCard').classList.toggle('selected', g === 'female');
    document.getElementById('nextBtn').disabled = false;
  };

  window.goNext = async () => {
    if (!selectedGender) { showToast('Please select gender!'); return; }
    if (!currentUser)    { location.href = 'login.html'; return; }
    document.getElementById('nextBtn').disabled = true;
    document.getElementById('nextBtn').textContent = 'Saving…';
    try {
      await saveUserProfile(currentUser.uid, { gender: selectedGender });
      location.href = 'basicinfo.html';
    } catch(e) {
      showToast('Error: ' + e.message);
      document.getElementById('nextBtn').disabled = false;
      document.getElementById('nextBtn').textContent = 'NEXT';
    }
  };

  let tt;
  function showToast(msg){
    const t=document.getElementById('toast');
    t.textContent=msg; t.classList.add('show');
    clearTimeout(tt); tt=setTimeout(()=>t.classList.remove('show'),2500);
  }
</script>
</body>
</html>
