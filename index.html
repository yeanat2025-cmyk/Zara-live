<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZaraLive</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    background:radial-gradient(ellipse at 30% 20%, #3a0ca3, #1a0050 60%, #0a0018);
    min-height:100vh; display:flex; flex-direction:column;
    align-items:center; justify-content:center; overflow:hidden;
  }
  .glow{
    position:absolute; width:340px; height:340px; border-radius:50%;
    background:radial-gradient(circle, rgba(124,92,252,0.3), transparent 70%);
    animation:glow 2.5s ease-in-out infinite alternate;
  }
  @keyframes glow{from{transform:scale(1)}to{transform:scale(1.2)}}

  .logo-wrap{position:relative;text-align:center;z-index:2;}

  .logo-img{
    width:110px; height:110px; border-radius:28px;
    object-fit:cover;
    box-shadow:0 12px 40px rgba(168,85,247,0.5);
    animation:pop 0.6s cubic-bezier(.34,1.56,.64,1) both;
  }
  /* Fallback if image missing */
  .logo-fallback{
    width:110px; height:110px; border-radius:28px;
    background:linear-gradient(135deg,#e040fb,#7c5cfc);
    display:none; align-items:center; justify-content:center;
    font-size:52px;
    box-shadow:0 12px 40px rgba(224,64,251,0.45);
    animation:pop 0.6s cubic-bezier(.34,1.56,.64,1) both;
    margin:0 auto;
  }
  @keyframes pop{from{opacity:0;transform:scale(0.5)}to{opacity:1;transform:scale(1)}}

  .logo-text{
    font-family:'Syne',sans-serif; font-size:36px; font-weight:800;
    color:#fff; letter-spacing:-1px; margin-top:18px;
    animation:fadeUp 0.5s 0.3s ease both;
  }
  .logo-sub{
    color:rgba(255,255,255,0.45); font-size:14px; margin-top:6px;
    animation:fadeUp 0.5s 0.45s ease both;
  }
  @keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}

  .loader{
    position:absolute; bottom:80px;
    display:flex; flex-direction:column; align-items:center; gap:14px;
  }
  .bar{
    width:160px; height:3px; border-radius:10px;
    background:rgba(255,255,255,0.1); overflow:hidden;
  }
  .bar-fill{
    height:100%; border-radius:10px;
    background:linear-gradient(90deg,#7c5cfc,#e040fb);
    animation:load 2.2s ease forwards;
  }
  @keyframes load{from{width:0}to{width:100%}}
  .loader-txt{color:rgba(255,255,255,0.35);font-size:12px;font-family:sans-serif}
</style>
</head>
<body>
<div class="glow"></div>
<div class="logo-wrap">
  <img
    class="logo-img"
    src="assets/app_logo.png"
    alt="ZaraLive"
    onerror="this.style.display='none';document.querySelector('.logo-fallback').style.display='flex'"
  >
  <div class="logo-fallback">🎙️</div>
  <div class="logo-text">ZaraLive</div>
  <div class="logo-sub">Live voice rooms for everyone</div>
</div>
<div class="loader">
  <div class="bar"><div class="bar-fill"></div></div>
  <div class="loader-txt" id="status">Loading…</div>
</div>

<script type="module">
  import { checkAuth, getUserProfile } from './firebase.js';
  const status = document.getElementById('status');
  setTimeout(() => {
    status.textContent = 'Checking session…';
    checkAuth(async (user) => {
      if (!user) { setTimeout(() => location.href = 'login.html', 500); return; }
      status.textContent = 'Welcome back!';
      const profile = await getUserProfile(user.uid);
      if (!profile?.gender)        { location.href = 'gender.html';    return; }
      if (!profile?.nickname)      { location.href = 'basicinfo.html'; return; }
      location.href = 'home.html';
    });
  }, 2300);
</script>
</body>
</html>
