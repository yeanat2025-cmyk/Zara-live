<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — ZaraLive</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    font-family:'DM Sans',sans-serif;
    background:radial-gradient(ellipse at 50% 0%, #2d0060 0%, #0e0020 55%, #0a0018 100%);
    min-height:100vh; display:flex; flex-direction:column;
    align-items:center; justify-content:center; padding:24px; overflow:hidden;
  }
  body::before{
    content:''; position:fixed; inset:0;
    background-image:
      radial-gradient(1px 1px at 20% 30%, rgba(255,255,255,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 70% 15%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 40% 70%, rgba(255,255,255,0.35) 0%, transparent 100%),
      radial-gradient(1px 1px at 85% 60%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 10% 85%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 55% 45%, rgba(255,255,255,0.3) 0%, transparent 100%);
    pointer-events:none;
  }

  .top-section{ text-align:center; margin-bottom:52px; z-index:1; }

  /* Logo image */
  .logo-img{
    width:88px; height:88px; border-radius:24px;
    object-fit:cover;
    box-shadow:0 8px 32px rgba(168,85,247,0.45);
    animation:pop 0.5s cubic-bezier(.34,1.56,.64,1) both;
    margin-bottom:16px;
  }
  .logo-fallback{
    width:88px; height:88px; border-radius:24px;
    background:linear-gradient(135deg,#e040fb,#7c5cfc);
    display:none; align-items:center; justify-content:center;
    font-size:40px; margin:0 auto 16px;
    box-shadow:0 8px 32px rgba(224,64,251,0.4);
    animation:pop 0.5s cubic-bezier(.34,1.56,.64,1) both;
  }
  @keyframes pop{from{opacity:0;transform:scale(0.6)}to{opacity:1;transform:scale(1)}}

  .logo-text{
    font-family:'Syne',sans-serif; font-size:28px; font-weight:800;
    color:#fff; letter-spacing:-0.5px;
  }
  .logo-sub{ color:rgba(255,255,255,0.4); font-size:13px; margin-top:4px; }

  .buttons-wrap{ width:100%; max-width:420px; z-index:1; }

  /* Quick Login */
  .btn-quick{
    width:100%; padding:0 20px; height:47px; border-radius:32px;
    background:linear-gradient(90deg,#c2185b,#7b1fa2,#4a148c);
    border:none; cursor:pointer;
    display:flex; align-items:center; margin-bottom:16px;
    box-shadow:0 6px 24px rgba(194,24,91,0.4);
    transition:opacity 0.2s,transform 0.15s;
    position:relative; overflow:hidden;
  }
  .btn-quick::before{
    content:''; position:absolute; inset:0;
    background-image:radial-gradient(1px 1px at 10% 20%, rgba(255,255,255,0.4) 0%,transparent 100%),
      radial-gradient(1px 1px at 40% 70%, rgba(255,255,255,0.3) 0%,transparent 100%),
      radial-gradient(1px 1px at 80% 30%, rgba(255,255,255,0.35) 0%,transparent 100%);
    pointer-events:none;
  }
  .btn-quick:hover{opacity:0.9;transform:translateY(-2px)}
  .btn-quick:active{transform:translateY(0)}

  .btn-icon{
    width:46px; height:46px; border-radius:50%; background:#fff;
    display:flex; align-items:center; justify-content:center;
    flex-shrink:0; overflow:hidden;
  }
  .btn-icon img{ width:30px; height:30px; object-fit:contain; }
  .btn-icon-fallback{ font-size:22px; }

  .btn-label{
    flex:1; text-align:center; margin-right:46px;
    font-family:'Syne',sans-serif; font-size:18px; font-weight:700;
    color:#fff; letter-spacing:0.3px;
  }

  /* Google */
  .btn-google{
    width:100%; padding:0 20px; height:47px; border-radius:32px;
    background:linear-gradient(90deg,#1565c0,#1976d2,#42a5f5);
    border:none; cursor:pointer;
    display:flex; align-items:center;
    box-shadow:0 6px 24px rgba(21,101,192,0.4);
    transition:opacity 0.2s,transform 0.15s;
    position:relative; overflow:hidden;
  }
  .btn-google::before{
    content:''; position:absolute; inset:0;
    background-image:radial-gradient(1px 1px at 20% 30%, rgba(255,255,255,0.35) 0%,transparent 100%),
      radial-gradient(1px 1px at 70% 60%, rgba(255,255,255,0.3) 0%,transparent 100%);
    pointer-events:none;
  }
  .btn-google:hover{opacity:0.9;transform:translateY(-2px)}
  .btn-google:active{transform:translateY(0)}
  .g-icon{
    width:46px; height:46px; border-radius:50%; background:#fff;
    display:flex; align-items:center; justify-content:center; flex-shrink:0;
  }
  .g-icon svg{ width:24px; height:24px; }

  .terms{
    text-align:center; margin-top:28px; font-size:13px;
    color:rgba(255,255,255,0.4); line-height:1.6; z-index:1;
  }
  .terms a{ color:rgba(255,255,255,0.7); text-decoration:underline; cursor:pointer; }

  .toast{
    position:fixed; bottom:40px; left:50%; transform:translateX(-50%);
    background:rgba(255,255,255,0.1); backdrop-filter:blur(12px);
    border:1px solid rgba(255,255,255,0.15);
    padding:10px 20px; border-radius:20px;
    color:#fff; font-size:13px; opacity:0; transition:opacity 0.3s;
    white-space:nowrap; z-index:99;
  }
  .toast.show{opacity:1}
  .loading-overlay{
    position:fixed; inset:0; background:rgba(10,0,24,0.85);
    display:none; flex-direction:column;
    align-items:center; justify-content:center; gap:14px; z-index:100;
  }
  .spinner{
    width:36px; height:36px; border-radius:50%;
    border:3px solid rgba(255,255,255,0.1); border-top-color:#e040fb;
    animation:spin 0.8s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg)}}
  .loading-overlay p{color:rgba(255,255,255,0.5);font-size:13px}
</style>
</head>
<body>

<div class="top-section">
  <img
    class="logo-img"
    src="assets/app_logo.png"
    alt="ZaraLive"
    onerror="this.style.display='none';document.querySelector('.logo-fallback').style.display='flex'"
  >
  <div class="logo-fallback">🎙️</div>
  <div class="logo-text">ZaraLive</div>
  <div class="logo-sub">Connect. Talk. Live.</div>
</div>

<div class="buttons-wrap">
  <!-- Quick Login -->
  <button class="btn-quick" onclick="quickLogin()">
    <div class="btn-icon">
      <img src="assets/app_logo.pn" alt="" onerror="this.style.display='none';this.nextElementSibling.style.display='block'">
      <span class="btn-icon-fallback" style="display:none">🚀</span>
    </div>
    <span class="btn-label">Quick Login</span>
  </button>

  <!-- Google -->
  <button class="btn-google" onclick="loginWithGoogle()">
    <div class="g-icon">
      <svg viewBox="0 0 48 48">
        <path fill="#EA4335" d="M24 9.5c3.1 0 5.8 1.1 8 2.9l6-6C34.5 3.1 29.6 1 24 1 14.7 1 6.9 6.6 3.4 14.5l7 5.4C12.1 13.1 17.5 9.5 24 9.5z"/>
        <path fill="#4285F4" d="M46.5 24.5c0-1.6-.1-3.1-.4-4.5H24v8.5h12.7c-.6 3-2.3 5.5-4.8 7.2l7.4 5.8c4.3-4 6.8-9.9 7.2-17z"/>
        <path fill="#FBBC05" d="M10.4 28.1A14.4 14.4 0 0 1 9.5 24c0-1.4.2-2.8.5-4.1l-7-5.4A23.5 23.5 0 0 0 .5 24c0 3.8.9 7.4 2.5 10.5l7.4-6.4z"/>
        <path fill="#34A853" d="M24 47c5.6 0 10.3-1.8 13.7-5l-7.4-5.8c-1.9 1.3-4.3 2-6.3 2-6.5 0-12-4.4-13.9-10.4l-7.4 5.8C6.9 41.4 14.7 47 24 47z"/>
      </svg>
    </div>
    <span class="btn-label">Continue with Google</span>
  </button>
</div>

<div class="terms">
  By Signing up you will be agree to our<br>
  <a>Terms & Condition</a> and <a>Privacy Policy</a>
</div>

<div class="toast" id="toast"></div>
<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
  <p>Signing in…</p>
</div>

<script type="module">
  import { googleLogin, checkAuth, getUserProfile, saveUserProfile } from './firebase.js';

  checkAuth(async (user) => {
    if (!user) return;
    const profile = await getUserProfile(user.uid);
    if (!profile?.gender)   { location.href = 'gender.html';    return; }
    if (!profile?.nickname) { location.href = 'basicinfo.html'; return; }
    location.href = 'home.html';
  });

  window.loginWithGoogle = async () => {
    showLoading();
    try {
      const user = await googleLogin();
      await saveUserProfile(user.uid, {
        uid: user.uid, email: user.email,
        displayName: user.displayName, photoURL: user.photoURL,
        createdAt: new Date().toISOString()
      });
      const profile = await getUserProfile(user.uid);
      if (!profile?.gender)   { location.href = 'gender.html';    return; }
      if (!profile?.nickname) { location.href = 'basicinfo.html'; return; }
      location.href = 'home.html';
    } catch(e) {
      hideLoading(); showToast("Login failed: " + e.message);
    }
  };

  window.quickLogin = () => showToast("Phone login coming soon!");

  function showLoading(){ document.getElementById('loadingOverlay').style.display='flex'; }
  function hideLoading(){ document.getElementById('loadingOverlay').style.display='none'; }
  let tt;
  function showToast(msg){
    const t=document.getElementById('toast');
    t.textContent=msg; t.classList.add('show');
    clearTimeout(tt); tt=setTimeout(()=>t.classList.remove('show'),2800);
  }
</script>
</body>
</html>
